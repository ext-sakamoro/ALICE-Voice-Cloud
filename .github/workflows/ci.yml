name: ALICE Voice Cloud CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
jobs:
  test-rust:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [core-engine, api-gateway]
    steps:
      - uses: actions/checkout@v4
      - name: Create dependency stub
        run: |
          mkdir -p ../../../ALICE-Voice/src
          cat > ../../../ALICE-Voice/Cargo.toml << 'TOML'
          [package]
          name = "alice-voice"
          version = "0.1.0"
          edition = "2021"
          [features]
          default = []
          std = []
          TOML
          echo "" > ../../../ALICE-Voice/src/lib.rs
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/${{ matrix.service }}
      - run: cd services/${{ matrix.service }} && cargo check
      - run: cd services/${{ matrix.service }} && cargo clippy -- -D warnings
  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: cd frontend && npm ci || npm install
      - run: cd frontend && npm run type-check
